asyncapi: 3.0.0
info:
  title: FAForever Lobby Server API
  version: 1.0.0
  description: |-
    WebSocket-based bidirectional messaging protocol for the FAForever lobby server.
    All messages are JSON objects separated by newlines, with a `command` field identifying the message type.

    This spec covers:
    - **Lobby messages** between the client and the lobby server
    - **Game messages** between the game client and the server (wrapped in lobby messages with `target: "game"`)
  license:
    name: MIT
    url: https://www.apache.org/licenses/LICENSE-2.0
defaultContentType: application/json
servers:
  production:
    host: ws.faforever.com
    pathname: /
    protocol: wss
  test:
    host: ws.faforever.xyz
    pathname: /
    protocol: wss
  local:
    host: localhost
    pathname: /
    protocol: ws
channels:
  server-inbound:
    title: Lobby messages sent from client to server
    messages:
      AuthenticateRequest:
        $ref: '#/components/messages/AuthenticateRequest'
      SessionRequest:
        $ref: '#/components/messages/SessionRequest'
      HostGameRequest:
        $ref: '#/components/messages/HostGameRequest'
      JoinGameRequest:
        $ref: '#/components/messages/JoinGameRequest'
      RestoreGameSessionRequest:
        $ref: '#/components/messages/RestoreGameSessionRequest'
      GameMatchmakingRequest:
        $ref: '#/components/messages/GameMatchmakingRequest'
      IsReadyResponse:
        $ref: '#/components/messages/IsReadyResponse'
      MatchmakerInfoRequest:
        $ref: '#/components/messages/MatchmakerInfoRequest'
      SetPlayerVetoesRequest:
        $ref: '#/components/messages/SetPlayerVetoesRequest'
      SocialAddRequest:
        $ref: '#/components/messages/SocialAddRequest'
      SocialRemoveRequest:
        $ref: '#/components/messages/SocialRemoveRequest'
      AvatarRequest:
        $ref: '#/components/messages/AvatarRequest'
      AdminRequest:
        $ref: '#/components/messages/AdminRequest'
      InviteToPartyRequest:
        $ref: '#/components/messages/InviteToPartyRequest'
      AcceptInviteToPartyRequest:
        $ref: '#/components/messages/AcceptInviteToPartyRequest'
      KickPlayerFromPartyRequest:
        $ref: '#/components/messages/KickPlayerFromPartyRequest'
      LeavePartyRequest:
        $ref: '#/components/messages/LeavePartyRequest'
      UnreadyPartyRequest:
        $ref: '#/components/messages/UnreadyPartyRequest'
      SelectPartyFactionsRequest:
        $ref: '#/components/messages/SelectPartyFactionsRequest'
      CoopListRequest:
        $ref: '#/components/messages/CoopListRequest'
      ModVaultRequest:
        $ref: '#/components/messages/ModVaultRequest'
      IceServersRequest:
        $ref: '#/components/messages/IceServersRequest'
      PingMessage:
        $ref: '#/components/messages/PingMessage'
      PongMessage:
        $ref: '#/components/messages/PongMessage'
  client-inbound:
    title: Lobby messages sent from server to client
    messages:
      WelcomeMessage:
        $ref: '#/components/messages/WelcomeMessage'
      SessionMessage:
        $ref: '#/components/messages/SessionMessage'
      AuthenticationFailedMessage:
        $ref: '#/components/messages/AuthenticationFailedMessage'
      PlayerInfoMessage:
        $ref: '#/components/messages/PlayerInfoMessage'
      GameInfoMessage:
        $ref: '#/components/messages/GameInfoMessage'
      SocialMessage:
        $ref: '#/components/messages/SocialMessage'
      GameLaunchMessage:
        $ref: '#/components/messages/GameLaunchMessage'
      GameJoinFailedMessage:
        $ref: '#/components/messages/GameJoinFailedMessage'
      MatchmakerInfoMessage:
        $ref: '#/components/messages/MatchmakerInfoMessage'
      SearchInfoMessage:
        $ref: '#/components/messages/SearchInfoMessage'
      SearchTimeoutMessage:
        $ref: '#/components/messages/SearchTimeoutMessage'
      SearchViolationMessage:
        $ref: '#/components/messages/SearchViolationMessage'
      MatchFoundMessage:
        $ref: '#/components/messages/MatchFoundMessage'
      MatchCancelledMessage:
        $ref: '#/components/messages/MatchCancelledMessage'
      UpdatePartyMessage:
        $ref: '#/components/messages/UpdatePartyMessage'
      PartyInviteMessage:
        $ref: '#/components/messages/PartyInviteMessage'
      KickedFromPartyMessage:
        $ref: '#/components/messages/KickedFromPartyMessage'
      VetoesInfoMessage:
        $ref: '#/components/messages/VetoesInfoMessage'
      CoopInfoMessage:
        $ref: '#/components/messages/CoopInfoMessage'
      AvatarListMessage:
        $ref: '#/components/messages/AvatarListMessage'
      ModVaultInfoMessage:
        $ref: '#/components/messages/ModVaultInfoMessage'
      UpdatedAchievementsMessage:
        $ref: '#/components/messages/UpdatedAchievementsMessage'
      IrcPasswordMessage:
        $ref: '#/components/messages/IrcPasswordMessage'
      IceServersMessage:
        $ref: '#/components/messages/IceServersMessage'
      NoticeMessage:
        $ref: '#/components/messages/NoticeMessage'
      InvalidMessage:
        $ref: '#/components/messages/InvalidMessage'
      DisabledMessage:
        $ref: '#/components/messages/DisabledMessage'
      ServerPingMessage:
        $ref: '#/components/messages/PingMessage'
      ServerPongMessage:
        $ref: '#/components/messages/PongMessage'
      IsReadyMessage:
        $ref: '#/components/messages/IsReadyMessage'
  game-server-inbound:
    title: Game messages sent from game client to server (target "game")
    description: |-
      These messages are wrapped inside the lobby WebSocket connection with `"target": "game"`.
      The game command is in the `command` field and arguments in the `args` array.
    messages:
      GameStateCommand:
        $ref: '#/components/messages/GameStateCommand'
      GameOptionCommand:
        $ref: '#/components/messages/GameOptionCommand'
      GameModsCommand:
        $ref: '#/components/messages/GameModsCommand'
      PlayerOptionCommand:
        $ref: '#/components/messages/PlayerOptionCommand'
      AIOptionCommand:
        $ref: '#/components/messages/AIOptionCommand'
      ClearSlotCommand:
        $ref: '#/components/messages/ClearSlotCommand'
      GameResultCommand:
        $ref: '#/components/messages/GameResultCommand'
      OperationCompleteCommand:
        $ref: '#/components/messages/OperationCompleteCommand'
      JsonStatsCommand:
        $ref: '#/components/messages/JsonStatsCommand'
      EnforceRatingCommand:
        $ref: '#/components/messages/EnforceRatingCommand'
      TeamkillReportCommand:
        $ref: '#/components/messages/TeamkillReportCommand'
      TeamkillHappenedCommand:
        $ref: '#/components/messages/TeamkillHappenedCommand'
      GameIceMsgCommand:
        $ref: '#/components/messages/GameIceMsgCommand'
      DesyncCommand:
        $ref: '#/components/messages/DesyncCommand'
      LaunchStatusCommand:
        $ref: '#/components/messages/LaunchStatusCommand'
      BottleneckCommand:
        $ref: '#/components/messages/BottleneckCommand'
      BottleneckClearedCommand:
        $ref: '#/components/messages/BottleneckClearedCommand'
      DisconnectedCommand:
        $ref: '#/components/messages/DisconnectedCommand'
      ChatCommand:
        $ref: '#/components/messages/ChatCommand'
      GameFullCommand:
        $ref: '#/components/messages/GameFullCommand'
      GameEndedCommand:
        $ref: '#/components/messages/GameEndedCommand'
      RehostCommand:
        $ref: '#/components/messages/RehostCommand'
  game-client-inbound:
    title: Game messages sent from server to game client (target "game")
    description: |-
      These messages are sent to the game client with `"target": "game"`.
      The game command is in the `command` field and arguments in the `args` array.
    messages:
      HostGameCommand:
        $ref: '#/components/messages/HostGameCommand'
      JoinGameCommand:
        $ref: '#/components/messages/JoinGameCommand'
      ConnectToPeerCommand:
        $ref: '#/components/messages/ConnectToPeerCommand'
      DisconnectFromPeerCommand:
        $ref: '#/components/messages/DisconnectFromPeerCommand'
      ServerIceMsgCommand:
        $ref: '#/components/messages/ServerIceMsgCommand'

operations:
  # =====================
  # Server receive (client -> server lobby messages)
  # =====================
  serverAuthenticate:
    action: receive
    description: Server receives authentication request with OAuth token
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/AuthenticateRequest'
    tags:
      - name: auth
  serverRequestSession:
    action: receive
    description: Server receives request for a session ID
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/SessionRequest'
    tags:
      - name: auth
  serverHostGame:
    action: receive
    description: Server receives request to host a game
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/HostGameRequest'
    tags:
      - name: game
  serverJoinGame:
    action: receive
    description: Server receives request to join a game
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/JoinGameRequest'
    tags:
      - name: game
  serverRestoreGameSession:
    action: receive
    description: Server receives request to restore a game session
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/RestoreGameSessionRequest'
    tags:
      - name: game
  serverSetMatchmakingStatus:
    action: receive
    description: Server receives request to join or leave a matchmaking queue
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/GameMatchmakingRequest'
    tags:
      - name: matchmaker
  serverGetIsReady:
    action: receive
    description: Server receives response to match readiness check
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/IsReadyResponse'
    tags:
      - name: matchmaker
  serverGetMatchmakerInfo:
    action: receive
    description: Server receives request for latest matchmaker queue info
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/MatchmakerInfoRequest'
    tags:
      - name: matchmaker
  serverSetPlayerVetoes:
    action: receive
    description: Server receives request to set map vetoes
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/SetPlayerVetoesRequest'
    tags:
      - name: matchmaker
  serverAddSocial:
    action: receive
    description: Server receives request to add a friend or foe
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/SocialAddRequest'
    tags:
      - name: social
  serverRemoveSocial:
    action: receive
    description: Server receives request to remove a friend or foe
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/SocialRemoveRequest'
    tags:
      - name: social
  serverAvatarRequest:
    action: receive
    description: Server receives avatar list or select request
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/AvatarRequest'
    tags:
      - name: social
  serverAdminAction:
    action: receive
    description: Server receives admin action (requires appropriate permissions)
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/AdminRequest'
    tags:
      - name: admin
  serverInviteToParty:
    action: receive
    description: Server receives request to invite a player to a party
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/InviteToPartyRequest'
    tags:
      - name: party
  serverAcceptInviteToParty:
    action: receive
    description: Server receives request to accept a party invite
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/AcceptInviteToPartyRequest'
    tags:
      - name: party
  serverKickPlayerFromParty:
    action: receive
    description: Server receives request to kick a player from a party
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/KickPlayerFromPartyRequest'
    tags:
      - name: party
  serverLeaveParty:
    action: receive
    description: Server receives request to leave a party
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/LeavePartyRequest'
    tags:
      - name: party
  serverUnreadyParty:
    action: receive
    description: Server receives request to unready a party
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/UnreadyPartyRequest'
    tags:
      - name: party
  serverSelectPartyFactions:
    action: receive
    description: Server receives request to set party faction preferences
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/SelectPartyFactionsRequest'
    tags:
      - name: party
  serverCoopList:
    action: receive
    description: Server receives request for cooperative mission list
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/CoopListRequest'
    tags:
      - name: coop
  serverModVault:
    action: receive
    description: Server receives mod vault request (DEPRECATED - use FAF API instead)
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/ModVaultRequest'
    tags:
      - name: vault
  serverIceServers:
    action: receive
    description: Server receives ICE servers request (DEPRECATED - handled outside lobby server)
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/IceServersRequest'
    tags:
      - name: deprecated
  serverPing:
    action: receive
    description: Ping received from client
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/PingMessage'
    tags:
      - name: heartbeat
  serverPong:
    action: receive
    description: Pong received from client
    channel:
      $ref: '#/channels/server-inbound'
    messages:
      - $ref: '#/channels/server-inbound/messages/PongMessage'
    tags:
      - name: heartbeat

  # =====================
  # Server send (server -> client lobby messages)
  # =====================
  clientWelcome:
    action: send
    description: Server sends welcome message after successful authentication
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/WelcomeMessage'
    tags:
      - name: auth
  clientSession:
    action: send
    description: Server sends session ID in response to ask_session
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/SessionMessage'
    tags:
      - name: auth
  clientAuthenticationFailed:
    action: send
    description: Server sends authentication failure message
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/AuthenticationFailedMessage'
    tags:
      - name: auth
  clientPlayerInfo:
    action: send
    description: Server sends player information (on login and broadcast updates)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/PlayerInfoMessage'
    tags:
      - name: player
  clientGameInfo:
    action: send
    description: Server sends game information (on login and broadcast updates)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/GameInfoMessage'
    tags:
      - name: game
  clientSocial:
    action: send
    description: Server sends friend/foe list and channel info after login
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/SocialMessage'
    tags:
      - name: social
  clientGameLaunch:
    action: send
    description: Server tells client to launch the game
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/GameLaunchMessage'
    tags:
      - name: game
  clientGameJoinFailed:
    action: send
    description: Server notifies client that joining a game failed
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/GameJoinFailedMessage'
    tags:
      - name: game
  clientMatchmakerInfo:
    action: send
    description: Server sends matchmaker queue information
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/MatchmakerInfoMessage'
    tags:
      - name: matchmaker
  clientSearchInfo:
    action: send
    description: Server sends matchmaking search status update
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/SearchInfoMessage'
    tags:
      - name: matchmaker
  clientSearchTimeout:
    action: send
    description: Server sends matchmaking timeout information for violated players
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/SearchTimeoutMessage'
    tags:
      - name: matchmaker
  clientSearchViolation:
    action: send
    description: Server sends violation info when a player fails to connect to a match
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/SearchViolationMessage'
    tags:
      - name: matchmaker
  clientMatchFound:
    action: send
    description: Server notifies client that a match has been found
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/MatchFoundMessage'
    tags:
      - name: matchmaker
  clientMatchCancelled:
    action: send
    description: Server notifies client that a match was cancelled (e.g. player failed to connect)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/MatchCancelledMessage'
    tags:
      - name: matchmaker
  clientUpdateParty:
    action: send
    description: Server sends party state update to all party members
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/UpdatePartyMessage'
    tags:
      - name: party
  clientPartyInvite:
    action: send
    description: Server sends party invitation to a player
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/PartyInviteMessage'
    tags:
      - name: party
  clientKickedFromParty:
    action: send
    description: Server notifies player they were kicked from a party
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/KickedFromPartyMessage'
    tags:
      - name: party
  clientVetoesInfo:
    action: send
    description: Server sends current map veto information
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/VetoesInfoMessage'
    tags:
      - name: matchmaker
  clientCoopInfo:
    action: send
    description: Server sends cooperative mission information
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/CoopInfoMessage'
    tags:
      - name: coop
  clientAvatarList:
    action: send
    description: Server sends list of available avatars for the player
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/AvatarListMessage'
    tags:
      - name: social
  clientModVaultInfo:
    action: send
    description: Server sends mod vault information (DEPRECATED - use FAF API)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/ModVaultInfoMessage'
    tags:
      - name: vault
  clientUpdatedAchievements:
    action: send
    description: Server sends updated achievement data
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/UpdatedAchievementsMessage'
    tags:
      - name: player
  clientIrcPassword:
    action: send
    description: Server sends IRC password (DEPRECATED - data is meaningless)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/IrcPasswordMessage'
    tags:
      - name: deprecated
  clientIceServers:
    action: send
    description: Server sends ICE server list (DEPRECATED - always empty)
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/IceServersMessage'
    tags:
      - name: deprecated
  clientNotice:
    action: send
    description: Server sends a notification or error message
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/NoticeMessage'
    tags:
      - name: notification
  clientInvalid:
    action: send
    description: Server sends invalid command response
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/InvalidMessage'
    tags:
      - name: notification
  clientDisabled:
    action: send
    description: Server notifies that a command is currently disabled
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/DisabledMessage'
    tags:
      - name: notification
  clientPing:
    action: send
    description: Server sends periodic ping to keep connection alive
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/ServerPingMessage'
    tags:
      - name: heartbeat
  clientPong:
    action: send
    description: Server responds to client ping
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/ServerPongMessage'
    tags:
      - name: heartbeat
  clientIsReady:
    action: send
    description: Server asks client if ready for a tournament or galactic war game
    channel:
      $ref: '#/channels/client-inbound'
    messages:
      - $ref: '#/channels/client-inbound/messages/IsReadyMessage'
    tags:
      - name: matchmaker

  # =====================
  # Game messages: game client -> server
  # =====================
  gameStateReceive:
    action: receive
    description: Game reports a state change (Idle, Lobby, Launching, Ended)
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameStateCommand'
    tags:
      - name: gpgnet
  gameOptionReceive:
    action: receive
    description: Game host sets a game option
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameOptionCommand'
    tags:
      - name: gpgnet
  gameModsReceive:
    action: receive
    description: Game host reports active game mods
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameModsCommand'
    tags:
      - name: gpgnet
  playerOptionReceive:
    action: receive
    description: Game host sets a player option
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/PlayerOptionCommand'
    tags:
      - name: gpgnet
  aiOptionReceive:
    action: receive
    description: Game host sets an AI option
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/AIOptionCommand'
    tags:
      - name: gpgnet
  clearSlotReceive:
    action: receive
    description: Game host clears a game slot
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/ClearSlotCommand'
    tags:
      - name: gpgnet
  gameResultReceive:
    action: receive
    description: Game reports a result for an army
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameResultCommand'
    tags:
      - name: gpgnet
  operationCompleteReceive:
    action: receive
    description: Game reports co-op mission completion
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/OperationCompleteCommand'
    tags:
      - name: gpgnet
  jsonStatsReceive:
    action: receive
    description: Game reports army statistics in JSON format
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/JsonStatsCommand'
    tags:
      - name: gpgnet
  enforceRatingReceive:
    action: receive
    description: Game reports that rating should be enforced
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/EnforceRatingCommand'
    tags:
      - name: gpgnet
  teamkillReportReceive:
    action: receive
    description: Player manually reports a teamkill
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/TeamkillReportCommand'
    tags:
      - name: gpgnet
  teamkillHappenedReceive:
    action: receive
    description: Game automatically reports a teamkill event
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/TeamkillHappenedCommand'
    tags:
      - name: gpgnet
  gameIceMsgReceive:
    action: receive
    description: Game sends an ICE negotiation message to forward to a peer
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameIceMsgCommand'
    tags:
      - name: gpgnet
  desyncReceive:
    action: receive
    description: Game reports a desynchronization event
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/DesyncCommand'
    tags:
      - name: gpgnet
  launchStatusReceive:
    action: receive
    description: Game reports launch status (e.g. Rejected for mismatched settings)
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/LaunchStatusCommand'
    tags:
      - name: gpgnet
  bottleneckReceive:
    action: receive
    description: Game reports a data bottleneck (player falling behind)
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/BottleneckCommand'
    tags:
      - name: gpgnet
  bottleneckClearedReceive:
    action: receive
    description: Game reports that a bottleneck has been resolved
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/BottleneckClearedCommand'
    tags:
      - name: gpgnet
  disconnectedReceive:
    action: receive
    description: Game reports a player disconnection
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/DisconnectedCommand'
    tags:
      - name: gpgnet
  chatReceive:
    action: receive
    description: Game reports a chat message from the game lobby
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/ChatCommand'
    tags:
      - name: gpgnet
  gameFullReceive:
    action: receive
    description: Game reports that all game slots are full
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameFullCommand'
    tags:
      - name: gpgnet
  gameEndedReceive:
    action: receive
    description: Game reports that the simulation has ended
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/GameEndedCommand'
    tags:
      - name: gpgnet
  rehostReceive:
    action: receive
    description: Game reports that the user has rehosted the game
    channel:
      $ref: '#/channels/game-server-inbound'
    messages:
      - $ref: '#/channels/game-server-inbound/messages/RehostCommand'
    tags:
      - name: gpgnet

  # =====================
  # Game messages: server -> game client
  # =====================
  gameHostGameSend:
    action: send
    description: Server tells game to start hosting and listening for connections
    channel:
      $ref: '#/channels/game-client-inbound'
    messages:
      - $ref: '#/channels/game-client-inbound/messages/HostGameCommand'
    tags:
      - name: gpgnet
  gameJoinGameSend:
    action: send
    description: Server tells game to join the host
    channel:
      $ref: '#/channels/game-client-inbound'
    messages:
      - $ref: '#/channels/game-client-inbound/messages/JoinGameCommand'
    tags:
      - name: gpgnet
  gameConnectToPeerSend:
    action: send
    description: Server tells game to connect to a peer for syncing
    channel:
      $ref: '#/channels/game-client-inbound'
    messages:
      - $ref: '#/channels/game-client-inbound/messages/ConnectToPeerCommand'
    tags:
      - name: gpgnet
  gameDisconnectFromPeerSend:
    action: send
    description: Server tells game to disconnect from a peer
    channel:
      $ref: '#/channels/game-client-inbound'
    messages:
      - $ref: '#/channels/game-client-inbound/messages/DisconnectFromPeerCommand'
    tags:
      - name: gpgnet
  gameIceMsgSend:
    action: send
    description: Server forwards an ICE negotiation message from another peer
    channel:
      $ref: '#/channels/game-client-inbound'
    messages:
      - $ref: '#/channels/game-client-inbound/messages/ServerIceMsgCommand'
    tags:
      - name: gpgnet

components:
  messages:
    # =============================================
    # Client -> Server lobby messages
    # =============================================
    AuthenticateRequest:
      name: auth
      title: Authenticate with OAuth token
      payload:
        type: object
        required:
          - command
          - token
          - unique_id
        properties:
          command:
            type: string
            const: auth
          token:
            type: string
            description: OAuth bearer token
          unique_id:
            type: string
            description: Unique hardware identifier hash
          session:
            type: integer
            description: Session ID received from ask_session
      examples:
        - summary: Authenticate with token
          payload:
            command: auth
            token: "eyJhbGciOiJSUzI1NiJ9..."
            unique_id: "7d04beb8-d4b8-40f5-8464-a9efa8546728"
            session: 812469452
    SessionRequest:
      name: ask_session
      title: Request a session ID
      payload:
        type: object
        required:
          - command
          - version
          - user_agent
        properties:
          command:
            type: string
            const: ask_session
          version:
            type: string
            description: Client version string
          user_agent:
            type: string
            description: Client user agent string
      examples:
        - summary: Request a session
          payload:
            command: ask_session
            version: "0.11.16"
            user_agent: "faf-client"
    HostGameRequest:
      name: game_host
      title: Request to host a game
      payload:
        type: object
        required:
          - command
          - visibility
          - title
          - mod
          - mapname
        properties:
          command:
            type: string
            const: game_host
          visibility:
            type: string
            enum:
              - public
              - friends
            description: Game visibility
          title:
            type: string
            description: Game title (ASCII only, non-empty)
          mod:
            type: string
            description: Featured mod technical name (e.g. "faf", "coop")
          mapname:
            type: string
            description: Map folder name
          password:
            type: string
            description: Game password (if visibility requires it)
          rating_min:
            type: number
            description: Minimum displayed rating for joining
          rating_max:
            type: number
            description: Maximum displayed rating for joining
          enforce_rating_range:
            type: boolean
            description: Whether to enforce the rating range
          access:
            type: string
            enum:
              - public
              - password
            description: Access type sent by some clients alongside visibility. Server ignores this field.
          options:
            type: string
            format: binary
            description: Options field sent by some clients. Server ignores this field.
          version:
            type: integer
            description: Client version sent by some clients. Server ignores this field.
      examples:
        - summary: Host a public custom game
          payload:
            command: game_host
            title: "Test game"
            visibility: public
            mod: faf
            mapname: scmp_007
            password: null
    JoinGameRequest:
      name: game_join
      title: Request to join a game
      payload:
        type: object
        required:
          - command
          - uid
        properties:
          command:
            type: string
            const: game_join
          uid:
            type: integer
            minimum: 1
            description: Game ID to join
          password:
            type: string
            description: Game password (if required)
      examples:
        - summary: Join a game by ID
          payload:
            command: game_join
            uid: 42
            password: null
    RestoreGameSessionRequest:
      name: restore_game_session
      title: Request to restore a game session
      description: Reconnect to an existing game that is still in lobby or live state
      payload:
        type: object
        required:
          - command
          - game_id
        properties:
          command:
            type: string
            const: restore_game_session
          game_id:
            type: integer
            minimum: 1
            description: ID of the game to reconnect to
      examples:
        - summary: Restore game session
          payload:
            command: restore_game_session
            game_id: 42
    GameMatchmakingRequest:
      name: game_matchmaking
      title: Request to join or leave a matchmaking queue
      payload:
        type: object
        required:
          - command
          - state
        properties:
          command:
            type: string
            const: game_matchmaking
          queue_name:
            type: string
            description: Technical name of the matchmaker queue
          mod:
            type: string
            deprecated: true
            description: "DEPRECATED: use queue_name instead"
          state:
            type: string
            enum:
              - start
              - stop
          faction:
            type: integer
            deprecated: true
            description: "DEPRECATED: use set_party_factions instead. Faction value: 1=UEF, 2=Aeon, 3=Cybran, 4=Seraphim"
      examples:
        - summary: Start searching ladder1v1 queue
          payload:
            command: game_matchmaking
            queue_name: ladder1v1
            state: start
    IsReadyResponse:
      name: is_ready_response
      title: Response to match readiness check
      payload:
        type: object
        required:
          - command
          - request_id
        properties:
          command:
            type: string
            const: is_ready_response
          request_id:
            type: string
      examples:
        - summary: Respond ready
          payload:
            command: is_ready_response
            request_id: "abc123"
    MatchmakerInfoRequest:
      name: matchmaker_info
      title: Request matchmaker queue information
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: matchmaker_info
      examples:
        - summary: Request matchmaker info
          payload:
            command: matchmaker_info
    SetPlayerVetoesRequest:
      name: set_player_vetoes
      title: Request to set map vetoes for matchmaking
      payload:
        type: object
        required:
          - command
          - vetoes
        properties:
          command:
            type: string
            const: set_player_vetoes
          vetoes:
            type: array
            items:
              type: object
              required:
                - map_pool_map_version_id
                - veto_tokens_applied
              properties:
                map_pool_map_version_id:
                  type: integer
                  minimum: 1
                veto_tokens_applied:
                  type: integer
                  minimum: 0
                matchmaker_queue_map_pool_id:
                  type: integer
                  minimum: 1
      examples:
        - summary: Veto a map
          payload:
            command: set_player_vetoes
            vetoes:
              - map_pool_map_version_id: 15
                veto_tokens_applied: 1
    SocialAddRequest:
      name: social_add
      title: Request to add a friend or foe
      description: Exactly one of `friend` or `foe` must be provided.
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: social_add
          friend:
            type: integer
            minimum: 1
            description: Player ID to add as friend
          foe:
            type: integer
            minimum: 1
            description: Player ID to add as foe
      examples:
        - summary: Add a friend
          payload:
            command: social_add
            friend: 42
        - summary: Add a foe
          payload:
            command: social_add
            foe: 99
    SocialRemoveRequest:
      name: social_remove
      title: Request to remove a friend or foe
      description: Exactly one of `friend` or `foe` must be provided.
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: social_remove
          friend:
            type: integer
            minimum: 1
            description: Player ID to remove as friend
          foe:
            type: integer
            minimum: 1
            description: Player ID to remove as foe
      examples:
        - summary: Remove a friend
          payload:
            command: social_remove
            friend: 42
    AvatarRequest:
      name: avatar
      title: Request to list or select an avatar
      payload:
        type: object
        required:
          - command
          - action
        properties:
          command:
            type: string
            const: avatar
          action:
            type: string
            enum:
              - list_avatar
              - select
          avatar:
            type: string
            description: Avatar URL to select (required when action is "select", null to deselect)
      examples:
        - summary: List available avatars
          payload:
            command: avatar
            action: list_avatar
        - summary: Select an avatar
          payload:
            command: avatar
            action: select
            avatar: "https://content.faforever.com/faf/avatars/UEF.png"
    AdminRequest:
      name: admin
      title: Admin commands
      description: Requires appropriate server permissions (ADMIN_KICK_SERVER, ADMIN_BROADCAST_MESSAGE, ADMIN_JOIN_CHANNEL)
      payload:
        type: object
        required:
          - command
          - action
        properties:
          command:
            type: string
            const: admin
          action:
            type: string
            enum:
              - closelobby
              - closeFA
              - broadcast
              - join_channel
          user_id:
            type: integer
            minimum: 1
            description: Target player ID (for closelobby/closeFA)
          message:
            type: string
            description: Message to broadcast (for broadcast action)
          user_ids:
            type: array
            items:
              type: integer
            description: List of player IDs (for join_channel action)
          channel:
            type: string
            description: Channel name to join (for join_channel action)
      examples:
        - summary: Kick a player
          payload:
            command: admin
            action: closelobby
            user_id: 42
        - summary: Broadcast a message
          payload:
            command: admin
            action: broadcast
            message: "Server will restart in 5 minutes"
    InviteToPartyRequest:
      name: invite_to_party
      title: Invite a player to your party
      payload:
        type: object
        required:
          - command
          - recipient_id
        properties:
          command:
            type: string
            const: invite_to_party
          recipient_id:
            type: integer
            minimum: 1
      examples:
        - summary: Invite player 3 to party
          payload:
            command: invite_to_party
            recipient_id: 3
    AcceptInviteToPartyRequest:
      name: accept_party_invite
      title: Accept a party invitation
      payload:
        type: object
        required:
          - command
          - sender_id
        properties:
          command:
            type: string
            const: accept_party_invite
          sender_id:
            type: integer
            minimum: 1
      examples:
        - summary: Accept invite from player 1
          payload:
            command: accept_party_invite
            sender_id: 1
    KickPlayerFromPartyRequest:
      name: kick_player_from_party
      title: Kick a player from your party
      payload:
        type: object
        required:
          - command
          - kicked_player_id
        properties:
          command:
            type: string
            const: kick_player_from_party
          kicked_player_id:
            type: integer
            minimum: 1
      examples:
        - summary: Kick player 3 from party
          payload:
            command: kick_player_from_party
            kicked_player_id: 3
    LeavePartyRequest:
      name: leave_party
      title: Leave your current party
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: leave_party
      examples:
        - summary: Leave current party
          payload:
            command: leave_party
    UnreadyPartyRequest:
      name: unready_party
      title: Unready your party
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: unready_party
      examples:
        - summary: Unready party
          payload:
            command: unready_party
    SelectPartyFactionsRequest:
      name: set_party_factions
      title: Set faction preferences for matchmaking
      payload:
        type: object
        required:
          - command
          - factions
        properties:
          command:
            type: string
            const: set_party_factions
          factions:
            type: array
            items:
              type: string
              enum:
                - uef
                - aeon
                - cybran
                - seraphim
            description: At least one faction must be selected
      examples:
        - summary: Set UEF faction preference
          payload:
            command: set_party_factions
            factions:
              - uef
    CoopListRequest:
      name: coop_list
      title: Request cooperative mission list
      description: Server responds with one coop_info message per mission
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: coop_list
      examples:
        - summary: Request co-op mission list
          payload:
            command: coop_list
    ModVaultRequest:
      name: modvault
      title: Mod vault operations (DEPRECATED)
      deprecated: true
      description: "DEPRECATED: Use the FAF API instead"
      payload:
        type: object
        required:
          - command
          - type
        properties:
          command:
            type: string
            const: modvault
          type:
            type: string
            enum:
              - start
              - like
              - download
          uid:
            type: string
            description: Mod UID (required for like/download)
      examples:
        - summary: List mods
          payload:
            command: modvault
            type: start
        - summary: Like a mod
          payload:
            command: modvault
            type: like
            uid: "FFF"
    IceServersRequest:
      name: ice_servers
      title: Request ICE servers (DEPRECATED)
      deprecated: true
      description: "DEPRECATED: ICE servers are handled outside of the lobby server. Response will always be an empty list."
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: ice_servers
      examples:
        - summary: Request ICE servers (deprecated)
          payload:
            command: ice_servers
    PingMessage:
      name: ping
      title: Ping
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: ping
      examples:
        - summary: Ping
          payload:
            command: ping
    PongMessage:
      name: pong
      title: Pong
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: pong
      examples:
        - summary: Pong
          payload:
            command: pong

    # =============================================
    # Server -> Client lobby messages
    # =============================================
    WelcomeMessage:
      name: welcome
      title: Welcome message after successful login
      description: Sent immediately after successful authentication. Contains the player's own info.
      payload:
        type: object
        required:
          - command
          - me
          - current_time
          - id
          - login
        properties:
          command:
            type: string
            const: welcome
          me:
            $ref: '#/components/schemas/PlayerInfo'
          current_time:
            type: string
            format: date-time
            description: Server current time in ISO 8601 format
          id:
            type: integer
            deprecated: true
            description: "DEPRECATED: Player ID (use me.id instead)"
          login:
            type: string
            deprecated: true
            description: "DEPRECATED: Player login (use me.login instead)"
      examples:
        - summary: Welcome after login
          payload:
            command: welcome
            me:
              id: 3
              login: "Rhiza"
              clan: "123"
              country: ""
              ratings:
                global:
                  rating: [1650.0, 62.52]
                  number_of_games: 2
                ladder_1v1:
                  rating: [1650.0, 62.52]
                  number_of_games: 2
              global_rating: [1650.0, 62.52]
              ladder_rating: [1650.0, 62.52]
              number_of_games: 2
            current_time: "1970-01-01T00:00:00+00:00"
            id: 3
            login: "Rhiza"
    SessionMessage:
      name: session
      title: Session ID response
      payload:
        type: object
        required:
          - command
          - session
        properties:
          command:
            type: string
            const: session
          session:
            type: integer
            description: Session ID to use for authentication
      examples:
        - summary: Session response
          payload:
            command: session
            session: 812469452
    AuthenticationFailedMessage:
      name: authentication_failed
      title: Authentication failure
      payload:
        type: object
        required:
          - command
          - text
        properties:
          command:
            type: string
            const: authentication_failed
          text:
            type: string
            description: Error message describing the failure
      examples:
        - summary: Login failed
          payload:
            command: authentication_failed
            text: "Login not found or password incorrect. They are case sensitive."
    PlayerInfoMessage:
      name: player_info
      title: Player information update
      description: |-
        Sent after login with all online players, and periodically broadcast
        when player data changes (ratings, avatar, state, etc.)
      payload:
        type: object
        required:
          - command
          - players
        properties:
          command:
            type: string
            const: player_info
          players:
            type: array
            items:
              $ref: '#/components/schemas/PlayerInfo'
      examples:
        - summary: Player info update
          payload:
            command: player_info
            players:
              - id: 3
                login: "Rhiza"
                clan: "123"
                country: ""
                ratings:
                  global:
                    rating: [1650.0, 62.52]
                    number_of_games: 2
                  ladder_1v1:
                    rating: [1650.0, 62.52]
                    number_of_games: 2
                global_rating: [1650.0, 62.52]
                ladder_rating: [1650.0, 62.52]
                number_of_games: 2
    GameInfoMessage:
      name: game_info
      title: Game information update
      description: |-
        Sent after login with all visible open games, and periodically broadcast
        when game data changes (players join/leave, state changes, etc.)
      payload:
        type: object
        required:
          - command
          - games
        properties:
          command:
            type: string
            const: game_info
          games:
            type: array
            items:
              $ref: '#/components/schemas/GameInfo'
      examples:
        - summary: Game info broadcast with nested games
          payload:
            command: game_info
            games:
              - command: game_info
                visibility: public
                password_protected: false
                uid: 42
                title: "Test Game"
                state: open
                game_type: custom
                featured_mod: faf
                sim_mods: {}
                mapname: scmp_007
                map_file_path: "maps/scmp_007.zip"
                host: test
                num_players: 1
                max_players: 12
                hosted_at: "2023-01-01T12:00:00+00:00"
                launched_at: null
                rating_type: global
                rating_min: null
                rating_max: null
                enforce_rating_range: false
                teams_ids:
                  - team_id: 2
                    player_ids: [1]
                teams:
                  "2": ["test"]
    SocialMessage:
      name: social
      title: Social data (friends, foes, channels)
      description: Sent after login with friend/foe lists and auto-join channels
      payload:
        type: object
        required:
          - command
        properties:
          command:
            type: string
            const: social
          autojoin:
            type: array
            items:
              type: string
            description: IRC channels to auto-join
          channels:
            type: array
            items:
              type: string
            description: IRC channels
          friends:
            type: array
            items:
              type: integer
            description: List of friend player IDs
          foes:
            type: array
            items:
              type: integer
            description: List of foe player IDs
          power:
            type: integer
            description: Player power level (admin privileges)
      examples:
        - summary: Social data after login
          payload:
            command: social
            autojoin:
              - "#123_clan"
            channels:
              - "#123_clan"
            friends: []
            foes: [400]
            power: 2
    GameLaunchMessage:
      name: game_launch
      title: Launch game
      description: |-
        Tells the client to launch the game executable. Sent when hosting, joining,
        or starting a matchmaker game.
      payload:
        type: object
        required:
          - command
          - uid
          - mod
          - name
          - init_mode
          - game_type
          - rating_type
        properties:
          command:
            type: string
            const: game_launch
          uid:
            type: integer
            description: Game ID
          mod:
            type: string
            description: Featured mod (e.g. "faf", "coop")
          name:
            type: string
            description: Game name
          init_mode:
            type: integer
