            maxItems: 2
      examples:
        - summary: ICE message from peer
          payload:
            command: IceMsg
            target: game
            args: [2, "{\"candidatesGathered\": true}"]

  schemas:
    PlayerInfo:
      type: object
      description: Player information object
      required:
        - id
        - login
        - ratings
      properties:
        id:
          type: integer
          description: Player ID
        login:
          type: string
          description: Player username
        avatar:
          type: object
          properties:
            url:
              type: string
            tooltip:
              type: string
          description: Currently selected avatar (null if none)
        country:
          type: string
          description: Two-letter country code from GeoIP
        clan:
          type: string
          description: Clan tag (null if not in a clan)
        state:
          type: string
          description: "Player state (null for online, 'offline' for offline)"
        ratings:
          type: object
          description: Map of rating type to rating data
          additionalProperties:
            type: object
            required:
              - rating
              - number_of_games
            properties:
              rating:
                type: array
                items:
                  type: number
                minItems: 2
                maxItems: 2
                description: "[mean, deviation] - displayed rating is mean - 3 * deviation"
              number_of_games:
                type: integer
                description: Number of games played in this rating type
        global_rating:
          type: array
          items:
            type: number
          deprecated: true
          description: "DEPRECATED: [mean, deviation] - use ratings.global instead"
        ladder_rating:
          type: array
          items:
            type: number
          deprecated: true
          description: "DEPRECATED: [mean, deviation] - use ratings.ladder_1v1 instead"
        number_of_games:
          type: integer
          deprecated: true
          description: "DEPRECATED: Use ratings instead"
    GameInfo:
      type: object
      description: Game information object
      required:
        - command
        - uid
        - title
        - state
        - game_type
        - featured_mod
        - mapname
        - host
        - num_players
        - max_players
        - rating_type
      properties:
        command:
          type: string
          const: game_info
        visibility:
          type: string
          enum:
            - public
            - friends
        password_protected:
          type: boolean
        uid:
          type: integer
          description: Game ID
        title:
          type: string
          description: Game name
        state:
          type: string
          enum:
            - open
            - playing
            - closed
        game_type:
          type: string
          enum:
            - coop
            - custom
            - matchmaker
        featured_mod:
          type: string
          description: Featured mod (e.g. "faf", "coop")
        sim_mods:
          type: object
          additionalProperties:
            type: string
          description: Active sim mods (UID -> name)
        mapname:
          type: string
          description: Map folder name
        map_file_path:
          type: string
          deprecated: true
          description: "DEPRECATED: Map file path"
        host:
          type: string
          description: Host player login
        num_players:
          type: integer
        max_players:
          type: integer
        hosted_at:
          type: string
          format: date-time
          description: When the game was hosted
        launched_at:
          type: number
          description: Unix timestamp when the game was launched
        rating_type:
          type: string
        rating_min:
          type: number
          description: Minimum displayed rating
        rating_max:
          type: number
          description: Maximum displayed rating
        enforce_rating_range:
          type: boolean
        teams_ids:
          type: array
          items:
            type: object
            properties:
              team_id:
                type: integer
              player_ids:
                type: array
                items:
                  type: integer
        teams:
          type: object
          description: "Map of team ID -> list of player logins. Client should prefer teams_ids."
          additionalProperties:
            type: array
            items:
              type: string
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameInfo'
          description: |-
            Nested list of game info objects. When the server broadcasts game updates,
            the outer message contains a `games` array. Individual GameInfo items may
            also contain this field when sent as part of the initial game list.
    QueueInfo:
      type: object
      description: Matchmaker queue information
      required:
        - queue_name
        - queue_pop_time
        - queue_pop_time_delta
        - num_players
        - team_size
      properties:
        queue_name:
          type: string
          description: Queue technical name
        queue_pop_time:
          type: string
          format: date-time
          description: Next queue pop time
        queue_pop_time_delta:
          type: number
          description: Seconds until next queue pop
        num_players:
          type: integer
          description: Number of players currently in queue
        boundary_80s:
          type: array
          items:
            type: array
            items:
              type: integer
            minItems: 2
            maxItems: 2
          description: "Rating boundary [min, max] at ~80% quality for each search in queue"
        boundary_75s:
          type: array
          items:
            type: array
            items:
              type: integer
            minItems: 2
            maxItems: 2
          description: "Rating boundary [min, max] at ~75% quality for each search in queue"
        team_size:
          type: integer
          description: Number of players per team
