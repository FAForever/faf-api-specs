            type: array
            description: "[host_player_name, host_player_id]"
            minItems: 2
            maxItems: 2
      examples:
        - summary: Join game hosted by test
          payload:
            command: JoinGame
            target: game
            args: ["test", 1]
    ConnectToPeerCommand:
      name: ConnectToPeer
      title: Connect to a peer
      description: Tells the game to establish a connection with another player for syncing
      payload:
        type: object
        required:
