            minItems: 1
            maxItems: 1
            items:
              type: string
      examples:
        - summary: Host game on map
          payload:
            command: HostGame
            target: game
            args: ["scmp_007"]
    JoinGameCommand:
      name: JoinGame
      title: Join a game
      description: Tells the game to connect to the host
      payload:
        type: object
